name: smp
version: '1.0.2'

main: io.main.smp.Smp
api-version: '26.1'

commands:
  pvpcancel:
    description: 전투 취소 요청
    usage: /pvpcancel
  pvpdeny:
    description: 전투 취소 요청 거절
    usage: /pvpdeny
  tpa:
    description: 텔레포트 요청
    usage: /tpa <플레이어>
  tpaccept:
    description: 텔레포트 요청 수락
    usage: /tpaccept
  tpdeny:
    description: 텔레포트 요청 거절
    usage: /tpdeny
  sethome:
    description: 집 설정 (최대 3개)
    usage: /sethome <이름>
  delhome:
    description: 집 삭제
    usage: /delhome <이름>
  home:
    description: 집으로 이동
    usage: /home <이름>
  back:
    description: 마지막 죽은 자리로 이동 (1분 이내)
    usage: /back
  logout:
    description: 안전하게 서버 나가기 (전투 중 15초 대기)
    usage: /logout
  smplang:
    description: 플러그인 언어 설정 (콘솔/관리자 전용)
    usage: /smplang <kr|en>
